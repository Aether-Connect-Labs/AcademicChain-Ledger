name = "trabajador-de-la-cadena-academica"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = [ "nodejs_compat" ]

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "academic-db"
database_id = "581c6b39-478f-4b86-80da-0c548187b89f"

# Cloudflare Workflows Binding
# [[workflows]]
# name = "diploma-registration"
# binding = "DIPLOMA_WORKFLOW"
# class_name = "DiplomaRegistrationWorkflow"

[vars]
ENVIRONMENT = "production"
ACL_AUTH_KEY = "demo-key"
ALLOWED_ORIGINS = "*"
HEDERA_ACCOUNT_ID = "0.0.7174400"
HEDERA_TOPIC_ID = "0.0.4576384"

# SECRETS NOTE:
# The following secrets must be set via `wrangler secret put <KEY>` for production:
# - JWT_SECRET
# - AI_API_KEY
# - FILECOIN_API_KEY
# - HEDERA_PRIVATE_KEY
# - XRP_SECRET
# - ALGORAND_MNEMONIC
# - MONGO_API_KEY
# - MONGO_APP_ID
#
# For local development, these are loaded from .dev.vars (which is git-ignored).
